kind = "web"
previewPath = "/"
title = "Project Management"
version = "1.0.0"
id = "artifacts/project-mgmt"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19365

[services.development]
run = "pnpm --filter @workspace/project-mgmt run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/project-mgmt", "run", "build" ]
publicDir = "artifacts/project-mgmt/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19365"
BASE_PATH = "/"
