kind = "web"
previewPath = "/may-chicken/"
title = "May Chicken & Burger"
version = "1.0.0"
id = "artifacts/may-chicken"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/may-chicken/" ]
localPort = 23298

[services.development]
run = "pnpm --filter @workspace/may-chicken run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/may-chicken", "run", "build" ]
publicDir = "artifacts/may-chicken/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23298"
BASE_PATH = "/may-chicken/"
