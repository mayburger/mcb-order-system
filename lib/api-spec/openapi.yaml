openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: May Chicken & Burger Restaurant API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health check
  - name: menu
    description: Public menu (categories & items)
  - name: restaurant
    description: Restaurant info, hours, delivery areas
  - name: orders
    description: Customer orders
  - name: auth
    description: Admin authentication
  - name: admin
    description: Admin management
  - name: kitchen
    description: Kitchen display system

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── PUBLIC MENU ──────────────────────────────────────────────────────────
  /menu/categories:
    get:
      operationId: listMenuCategories
      tags: [menu]
      summary: List all menu categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /menu/items:
    get:
      operationId: listMenuItems
      tags: [menu]
      summary: List menu items
      parameters:
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: available
          in: query
          schema:
            type: boolean
        - name: featured
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of menu items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenuItem"

  /menu/items/{id}:
    get:
      operationId: getMenuItem
      tags: [menu]
      summary: Get a single menu item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Menu item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
        "404":
          description: Not found

  /menu/option-groups:
    get:
      operationId: listMenuOptionGroups
      tags: [menu]
      summary: List all global option groups with their items
      responses:
        "200":
          description: Option groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OptionGroup"

  # ── PUBLIC RESTAURANT INFO ────────────────────────────────────────────────
  /restaurant/info:
    get:
      operationId: getRestaurantInfo
      tags: [restaurant]
      summary: Get restaurant contact and general info
      responses:
        "200":
          description: Restaurant info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestaurantInfo"

  /restaurant/opening-hours:
    get:
      operationId: getOpeningHours
      tags: [restaurant]
      summary: Get opening hours for all days
      responses:
        "200":
          description: Opening hours per day
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DayHours"

  /restaurant/delivery-areas:
    get:
      operationId: listDeliveryAreas
      tags: [restaurant]
      summary: List active delivery areas
      responses:
        "200":
          description: Delivery areas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeliveryArea"

  # ── PUBLIC ORDERS ─────────────────────────────────────────────────────────
  /restaurant/orders:
    post:
      operationId: createOrder
      tags: [orders]
      summary: Place a new customer order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Order placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Validation error

  /restaurant/orders/{id}:
    get:
      operationId: getOrderStatus
      tags: [orders]
      summary: Track order status by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found

  /restaurant/coupons/validate:
    post:
      operationId: validateCoupon
      tags: [orders]
      summary: Validate a coupon code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CouponValidationInput"
      responses:
        "200":
          description: Coupon valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Coupon"
        "404":
          description: Invalid or expired coupon

  # ── AUTH ─────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: adminLogin
      tags: [auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCredentials"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSession"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: adminLogout
      tags: [auth]
      summary: Admin logout
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getAdminSession
      tags: [auth]
      summary: Get current session
      responses:
        "200":
          description: Session info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSession"

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change the current user's own password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInput"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
        "400":
          description: Invalid input
        "401":
          description: Not authenticated or wrong current password

  # ── ADMIN – USERS (owner only) ────────────────────────────────────────────
  /admin/users:
    get:
      operationId: listUsers
      tags: [admin]
      summary: List staff users
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [admin]
      summary: Create a staff user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Invalid input
        "409":
          description: Username already exists

  /admin/users/{id}:
    patch:
      operationId: updateUser
      tags: [admin]
      summary: Update a staff user (role, active state, or reset password)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Invalid input or last-owner protection
        "404":
          description: Not found

  # ── ADMIN – ACTIVITY LOG (owner only) ─────────────────────────────────────
  /admin/activity-log:
    get:
      operationId: listActivityLog
      tags: [admin]
      summary: List recent important actions (audit trail)
      responses:
        "200":
          description: Activity log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityLogEntry"

  # ── ADMIN – DRIVER (delivery orders only) ─────────────────────────────────
  /admin/driver/orders:
    get:
      operationId: listDriverOrders
      tags: [admin]
      summary: List active delivery orders for the driver view
      responses:
        "200":
          description: Delivery orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /admin/driver/orders/{id}/status:
    patch:
      operationId: updateDriverOrderStatus
      tags: [admin]
      summary: Driver sets a delivery order's status (delivering or completed only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DriverStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Invalid status transition
        "404":
          description: Not found

  # ── ADMIN – STATS ─────────────────────────────────────────────────────────
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Dashboard overview stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  # ── ADMIN – FULL DASHBOARD ────────────────────────────────────────────────
  /admin/dashboard:
    get:
      operationId: getAdminDashboard
      tags: [admin]
      summary: Full dashboard statistics (revenue, orders, bestsellers, extras, source, payment, customers, kitchen, stock)
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  # ── ADMIN – CATEGORIES ───────────────────────────────────────────────────
  /admin/categories:
    get:
      operationId: listAdminCategories
      tags: [admin]
      summary: List all categories (admin)
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [admin]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /admin/categories/{id}:
    patch:
      operationId: updateCategory
      tags: [admin]
      summary: Update a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [admin]
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── ADMIN – PRODUCTS ──────────────────────────────────────────────────────
  /admin/items:
    get:
      operationId: listAdminItems
      tags: [admin]
      summary: List all menu items (admin)
      parameters:
        - name: categoryId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Menu items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenuItem"
    post:
      operationId: createAdminMenuItem
      tags: [admin]
      summary: Create a menu item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MenuItemInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"

  /admin/items/{id}:
    patch:
      operationId: updateAdminMenuItem
      tags: [admin]
      summary: Update a menu item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MenuItemUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
    delete:
      operationId: deleteAdminMenuItem
      tags: [admin]
      summary: Delete a menu item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── ADMIN – VARIANTS ──────────────────────────────────────────────────────
  /admin/items/{id}/variants:
    get:
      operationId: listItemVariants
      tags: [admin]
      summary: List variants for a menu item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Variants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ItemVariant"
    post:
      operationId: createItemVariant
      tags: [admin]
      summary: Create a variant for a menu item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemVariantInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemVariant"

  /admin/variants/{id}:
    patch:
      operationId: updateItemVariant
      tags: [admin]
      summary: Update a variant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemVariantUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemVariant"
    delete:
      operationId: deleteItemVariant
      tags: [admin]
      summary: Delete a variant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── ADMIN – EXTRAS ────────────────────────────────────────────────────────
  /admin/items/{id}/extras:
    get:
      operationId: listItemExtras
      tags: [admin]
      summary: List extras for a menu item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Extras
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ItemExtra"
    post:
      operationId: createItemExtra
      tags: [admin]
      summary: Create an extra for a menu item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemExtraInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemExtra"

  /admin/items/{id}/recipe:
    get:
      operationId: getItemRecipe
      tags: [admin]
      summary: Get the recipe (ingredient lines) for a menu item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Recipe lines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecipeLine"
    put:
      operationId: updateItemRecipe
      tags: [admin]
      summary: Replace the recipe for a menu item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecipeUpdate"
      responses:
        "200":
          description: Updated recipe lines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecipeLine"

  /admin/extras/{id}:
    patch:
      operationId: updateItemExtra
      tags: [admin]
      summary: Update an extra
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemExtraUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemExtra"
    delete:
      operationId: deleteItemExtra
      tags: [admin]
      summary: Delete an extra
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── ADMIN – OPTION GROUPS ─────────────────────────────────────────────────
  /admin/option-groups:
    get:
      operationId: listAdminOptionGroups
      tags: [admin]
      summary: List all global option groups
      responses:
        "200":
          description: Option groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OptionGroup"
    post:
      operationId: createAdminOptionGroup
      tags: [admin]
      summary: Create a global option group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OptionGroupInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptionGroup"

  /admin/option-groups/{id}:
    patch:
      operationId: updateAdminOptionGroup
      tags: [admin]
      summary: Update an option group
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OptionGroupUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptionGroup"
    delete:
      operationId: deleteAdminOptionGroup
      tags: [admin]
      summary: Delete an option group
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/option-groups/{id}/items:
    post:
      operationId: createAdminOptionItem
      tags: [admin]
      summary: Add an item to an option group
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OptionItemInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptionGroupItem"

  /admin/option-items/{id}:
    patch:
      operationId: updateAdminOptionItem
      tags: [admin]
      summary: Update an option item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OptionItemUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptionGroupItem"
    delete:
      operationId: deleteAdminOptionItem
      tags: [admin]
      summary: Delete an option item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/option-groups/{id}/categories:
    post:
      operationId: linkCategoryToOptionGroup
      tags: [admin]
      summary: Link a category to an option group
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryOptionGroupLink"
      responses:
        "201":
          description: Linked

  /admin/category-option-groups/{id}:
    delete:
      operationId: unlinkCategoryFromOptionGroup
      tags: [admin]
      summary: Remove a category–option-group link
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Unlinked

  /admin/option-groups/{id}/menu-items:
    post:
      operationId: linkMenuItemToOptionGroup
      tags: [admin]
      summary: Link a menu item directly to an option group
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemOptionGroupLink"
      responses:
        "201":
          description: Linked

  /admin/option-groups/{groupId}/menu-items/{menuItemId}:
    delete:
      operationId: unlinkMenuItemFromOptionGroup
      tags: [admin]
      summary: Remove a menu-item–option-group link
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
        - name: menuItemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Unlinked

  /admin/categories/sort:
    patch:
      operationId: bulkSortCategories
      tags: [admin]
      summary: Bulk-update category sort order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SortOrderUpdate"
      responses:
        "200":
          description: OK

  /admin/items/sort:
    patch:
      operationId: bulkSortMenuItems
      tags: [admin]
      summary: Bulk-update menu item sort order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SortOrderUpdate"
      responses:
        "200":
          description: OK

  /admin/items/{id}/option-prices:
    get:
      operationId: getItemOptionPrices
      tags: [admin]
      summary: Get per-item option prices (e.g. pizza size prices)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Prices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ItemOptionPrice"
    put:
      operationId: setItemOptionPrices
      tags: [admin]
      summary: Set per-item option prices (bulk upsert)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemOptionPricesInput"
      responses:
        "200":
          description: Prices updated

  # ── ADMIN – ORDERS ────────────────────────────────────────────────────────
  /admin/orders:
    get:
      operationId: listAdminOrders
      tags: [admin]
      summary: List all orders (admin)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, confirmed, preparing, ready, delivering, completed, cancelled]
        - name: orderType
          in: query
          schema:
            type: string
            enum: [delivery, pickup]
        - name: date
          in: query
          schema:
            type: string
            format: date
        - name: archived
          in: query
          description: When true, returns only archived orders. Otherwise archived orders are excluded.
          schema:
            type: boolean
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

