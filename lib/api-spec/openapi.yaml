openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: May Chicken & Burger Restaurant API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health check
  - name: menu
    description: Public menu (categories & items)
  - name: restaurant
    description: Restaurant info, hours, delivery areas
  - name: orders
    description: Customer orders
  - name: auth
    description: Admin authentication
  - name: admin
    description: Admin management
  - name: kitchen
    description: Kitchen display system

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── PUBLIC MENU ──────────────────────────────────────────────────────────
  /menu/categories:
    get:
      operationId: listMenuCategories
      tags: [menu]
      summary: List all menu categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /menu/items:
    get:
      operationId: listMenuItems
      tags: [menu]
      summary: List menu items
      parameters:
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: available
          in: query
          schema:
            type: boolean
        - name: featured
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of menu items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenuItem"

  /menu/items/{id}:
    get:
      operationId: getMenuItem
      tags: [menu]
      summary: Get a single menu item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Menu item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
        "404":
          description: Not found

  /menu/option-groups:
    get:
      operationId: listMenuOptionGroups
      tags: [menu]
      summary: List all global option groups with their items
      responses:
        "200":
          description: Option groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OptionGroup"

  # ── PUBLIC RESTAURANT INFO ────────────────────────────────────────────────
  /restaurant/info:
    get:
      operationId: getRestaurantInfo
      tags: [restaurant]
      summary: Get restaurant contact and general info
      responses:
        "200":
          description: Restaurant info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestaurantInfo"

  /restaurant/opening-hours:
    get:
      operationId: getOpeningHours
      tags: [restaurant]
      summary: Get opening hours for all days
      responses:
        "200":
          description: Opening hours per day
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DayHours"

  /restaurant/delivery-areas:
    get:
      operationId: listDeliveryAreas
      tags: [restaurant]
      summary: List active delivery areas
      responses:
        "200":
          description: Delivery areas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeliveryArea"

  # ── PUBLIC ORDERS ─────────────────────────────────────────────────────────
  /restaurant/orders:
    post:
      operationId: createOrder
      tags: [orders]
      summary: Place a new customer order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Order placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Validation error

  /restaurant/orders/{id}:
    get:
      operationId: getOrderStatus
      tags: [orders]
      summary: Track order status by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found

  /restaurant/coupons/validate:
    post:
      operationId: validateCoupon
      tags: [orders]
      summary: Validate a coupon code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CouponValidationInput"
      responses:
        "200":
          description: Coupon valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Coupon"
        "404":
          description: Invalid or expired coupon

  # ── AUTH ─────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: adminLogin
      tags: [auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCredentials"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSession"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: adminLogout
      tags: [auth]
      summary: Admin logout
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getAdminSession
      tags: [auth]
      summary: Get current session
      responses:
        "200":
          description: Session info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSession"

  # ── ADMIN – STATS ─────────────────────────────────────────────────────────
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Dashboard overview stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  # ── ADMIN – CATEGORIES ───────────────────────────────────────────────────
  /admin/categories:
    get:
      operationId: listAdminCategories
      tags: [admin]
      summary: List all categories (admin)
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [admin]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /admin/categories/{id}:
    patch:
      operationId: updateCategory
      tags: [admin]
      summary: Update a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [admin]
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── ADMIN – PRODUCTS ──────────────────────────────────────────────────────
  /admin/items:
    get:
      operationId: listAdminItems
      tags: [admin]
      summary: List all menu items (admin)
      parameters:
        - name: categoryId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Menu items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenuItem"
    post:
      operationId: createAdminMenuItem
      tags: [admin]
      summary: Create a menu item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MenuItemInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"

  /admin/items/{id}:
    patch:
      operationId: updateAdminMenuItem
      tags: [admin]
      summary: Update a menu item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MenuItemUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
    delete:
      operationId: deleteAdminMenuItem
      tags: [admin]
      summary: Delete a menu item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── ADMIN – VARIANTS ──────────────────────────────────────────────────────
  /admin/items/{id}/variants:
    get:
      operationId: listItemVariants
      tags: [admin]
      summary: List variants for a menu item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Variants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ItemVariant"
    post:
      operationId: createItemVariant
      tags: [admin]
      summary: Create a variant for a menu item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemVariantInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemVariant"

  /admin/variants/{id}:
    patch:
      operationId: updateItemVariant
      tags: [admin]
      summary: Update a variant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemVariantUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemVariant"
    delete:
      operationId: deleteItemVariant
      tags: [admin]
      summary: Delete a variant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── ADMIN – EXTRAS ────────────────────────────────────────────────────────
  /admin/items/{id}/extras:
    get:
      operationId: listItemExtras
      tags: [admin]
      summary: List extras for a menu item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Extras
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ItemExtra"
    post:
      operationId: createItemExtra
      tags: [admin]
      summary: Create an extra for a menu item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemExtraInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemExtra"

  /admin/extras/{id}:
    patch:
      operationId: updateItemExtra
      tags: [admin]
      summary: Update an extra
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemExtraUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemExtra"
    delete:
      operationId: deleteItemExtra
      tags: [admin]
      summary: Delete an extra
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── ADMIN – OPTION GROUPS ─────────────────────────────────────────────────
  /admin/option-groups:
    get:
      operationId: listAdminOptionGroups
      tags: [admin]
      summary: List all global option groups
      responses:
        "200":
          description: Option groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OptionGroup"
    post:
      operationId: createAdminOptionGroup
      tags: [admin]
      summary: Create a global option group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OptionGroupInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptionGroup"

  /admin/option-groups/{id}:
    patch:
      operationId: updateAdminOptionGroup
      tags: [admin]
      summary: Update an option group
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OptionGroupUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptionGroup"
    delete:
      operationId: deleteAdminOptionGroup
      tags: [admin]
      summary: Delete an option group
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/option-groups/{id}/items:
    post:
      operationId: createAdminOptionItem
      tags: [admin]
      summary: Add an item to an option group
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OptionItemInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptionGroupItem"

  /admin/option-items/{id}:
    patch:
      operationId: updateAdminOptionItem
      tags: [admin]
      summary: Update an option item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OptionItemUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptionGroupItem"
    delete:
      operationId: deleteAdminOptionItem
      tags: [admin]
      summary: Delete an option item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/option-groups/{id}/categories:
    post:
      operationId: linkCategoryToOptionGroup
      tags: [admin]
      summary: Link a category to an option group
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryOptionGroupLink"
      responses:
        "201":
          description: Linked

  /admin/category-option-groups/{id}:
    delete:
      operationId: unlinkCategoryFromOptionGroup
      tags: [admin]
      summary: Remove a category–option-group link
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Unlinked

  /admin/items/{id}/option-prices:
    get:
      operationId: getItemOptionPrices
      tags: [admin]
      summary: Get per-item option prices (e.g. pizza size prices)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Prices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ItemOptionPrice"
    put:
      operationId: setItemOptionPrices
      tags: [admin]
      summary: Set per-item option prices (bulk upsert)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemOptionPricesInput"
      responses:
        "200":
          description: Prices updated

  # ── ADMIN – ORDERS ────────────────────────────────────────────────────────
  /admin/orders:
    get:
      operationId: listAdminOrders
      tags: [admin]
      summary: List all orders (admin)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, confirmed, preparing, ready, delivering, completed, cancelled]
        - name: orderType
          in: query
          schema:
            type: string
            enum: [delivery, pickup]
        - name: date
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /admin/orders/{id}:
    get:
      operationId: getAdminOrder
      tags: [admin]
      summary: Get a single order (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    patch:
      operationId: updateAdminOrder
      tags: [admin]
      summary: Update order status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusPatch"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  # ── ADMIN – CUSTOMERS ─────────────────────────────────────────────────────
  /admin/customers:
    get:
      operationId: listCustomers
      tags: [admin]
      summary: List all customers derived from orders
      responses:
        "200":
          description: Customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"

  # ── ADMIN – DELIVERY AREAS ────────────────────────────────────────────────
  /admin/delivery-areas:
    get:
      operationId: listAdminDeliveryAreas
      tags: [admin]
      summary: List all delivery areas (admin)
      responses:
        "200":
          description: Delivery areas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeliveryArea"
    post:
      operationId: createDeliveryArea
      tags: [admin]
      summary: Create a delivery area
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeliveryAreaInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryArea"

  /admin/delivery-areas/{id}:
    patch:
      operationId: updateDeliveryArea
      tags: [admin]
      summary: Update a delivery area
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeliveryAreaUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryArea"
    delete:
      operationId: deleteDeliveryArea
      tags: [admin]
      summary: Delete a delivery area
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── ADMIN – OPENING HOURS ─────────────────────────────────────────────────
  /admin/opening-hours:
    get:
      operationId: getAdminOpeningHours
      tags: [admin]
      summary: Get opening hours (admin)
      responses:
        "200":
          description: Opening hours
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DayHours"
    put:
      operationId: updateOpeningHours
      tags: [admin]
      summary: Update opening hours for all days
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpeningHoursUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DayHours"

  # ── ADMIN – COUPONS ───────────────────────────────────────────────────────
  /admin/coupons:
    get:
      operationId: listCoupons
      tags: [admin]
      summary: List all coupons
      responses:
        "200":
          description: Coupons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Coupon"
    post:
      operationId: createCoupon
      tags: [admin]
      summary: Create a coupon
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CouponInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Coupon"

  /admin/coupons/{id}:
    patch:
      operationId: updateCoupon
      tags: [admin]
      summary: Update a coupon
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CouponUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Coupon"
    delete:
      operationId: deleteCoupon
      tags: [admin]
      summary: Delete a coupon
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── ADMIN – SETTINGS ─────────────────────────────────────────────────────
  /admin/settings:
    get:
      operationId: getAdminSettings
      tags: [admin]
      summary: Get all app settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettings"
    put:
      operationId: updateAdminSettings
      tags: [admin]
      summary: Update app settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettings"

  # ── CUSTOMER AUTH & ACCOUNT ──────────────────────────────────────────────
  /customer/register:
    post:
      operationId: customerRegister
      tags: [customer]
      summary: Register a new customer account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerRegisterInput"
      responses:
        "201":
          description: Registered and logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerSession"
        "409":
          description: E-Mail already taken

  /customer/login:
    post:
      operationId: customerLogin
      tags: [customer]
      summary: Login as customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerLoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerSession"
        "401":
          description: Invalid credentials

  /customer/logout:
    post:
      operationId: customerLogout
      tags: [customer]
      summary: Logout customer
      responses:
        "200":
          description: Logged out

  /customer/me:
    get:
      operationId: getCustomerSession
      tags: [customer]
      summary: Get current customer session
      responses:
        "200":
          description: Session info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerSession"

  /customer/orders:
    get:
      operationId: listCustomerOrders
      tags: [customer]
      summary: List orders for the logged-in customer
      responses:
        "200":
          description: Order history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
        "401":
          description: Not authenticated

  /customer/orders/{id}:
    get:
      operationId: getCustomerOrder
      tags: [customer]
      summary: Get a specific order belonging to the customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found

  /customer/favorites:
    get:
      operationId: listCustomerFavorites
      tags: [customer]
      summary: List saved favorite orders
      responses:
        "200":
          description: Favorites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FavoriteOrder"
        "401":
          description: Not authenticated
    post:
      operationId: createCustomerFavorite
      tags: [customer]
      summary: Save a new favorite order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FavoriteOrderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FavoriteOrder"

  /customer/favorites/{id}:
    delete:
      operationId: deleteCustomerFavorite
      tags: [customer]
      summary: Delete a favorite order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted

  /customer/notes:
    get:
      operationId: listCustomerNotes
      tags: [customer]
      summary: List saved delivery notes
      responses:
        "200":
          description: Notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomerNote"
        "401":
          description: Not authenticated
    post:
      operationId: createCustomerNote
      tags: [customer]
      summary: Save a new delivery note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerNoteInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerNote"

  /customer/notes/{id}:
    delete:
      operationId: deleteCustomerNote
      tags: [customer]
      summary: Delete a saved note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted

  /admin/customers/{id}:
    get:
      operationId: getAdminCustomer
      tags: [admin]
      summary: Get detailed customer info including stats, notes, favorites
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerAdminDetail"
        "404":
          description: Not found

  # ── KITCHEN ───────────────────────────────────────────────────────────────
  /kitchen/orders:
    get:
      operationId: listKitchenOrders
      tags: [kitchen]
      summary: Active orders for kitchen display
      responses:
        "200":
          description: Active orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /kitchen/orders/{id}/status:
    patch:
      operationId: updateKitchenOrderStatus
      tags: [kitchen]
      summary: Update order status from kitchen
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KitchenOrderStatusPatch"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ── CATEGORY ──────────────────────────────────────────────────────────
    Category:
      type: object
      required: [id, name, slug, sortOrder, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        sortOrder:
          type: integer
        itemCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    CategoryInput:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
          minLength: 1
        slug:
          type: string
          minLength: 1
        description:
          type: string
        imageUrl:
          type: string
        sortOrder:
          type: integer

    CategoryUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        slug:
          type: string
        description:
          type: string
        imageUrl:
          type: string
        sortOrder:
          type: integer

    # ── VARIANTS & EXTRAS ─────────────────────────────────────────────────
    ItemVariant:
      type: object
      required: [id, menuItemId, name, price, sortOrder]
      properties:
        id:
          type: integer
        menuItemId:
          type: integer
        name:
          type: string
        price:
          type: number
        sortOrder:
          type: integer

    ItemVariantInput:
      type: object
      required: [name, price]
      properties:
        name:
          type: string
          minLength: 1
        price:
          type: number
          minimum: 0
        sortOrder:
          type: integer

    ItemVariantUpdate:
      type: object
      properties:
        name:
          type: string
        price:
          type: number
        sortOrder:
          type: integer

    ItemExtra:
      type: object
      required: [id, name, price, available, sortOrder]
      properties:
        id:
          type: integer
        menuItemId:
          type: ["integer", "null"]
        categoryId:
          type: ["integer", "null"]
        name:
          type: string
        price:
          type: number
        available:
          type: boolean
        sortOrder:
          type: integer

    ItemExtraInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        price:
          type: number
          minimum: 0
        available:
          type: boolean
        sortOrder:
          type: integer

    ItemExtraUpdate:
      type: object
      properties:
        name:
          type: string
        price:
          type: number
        available:
          type: boolean
        sortOrder:
          type: integer

    # ── OPTION GROUPS ─────────────────────────────────────────────────────
    OptionGroupItem:
      type: object
      required: [id, groupId, name, defaultPrice, sortOrder, available]
      properties:
        id:
          type: integer
        groupId:
          type: integer
        name:
          type: string
        defaultPrice:
          type: number
        priceByVariant:
          type: object
          additionalProperties:
            type: number
          nullable: true
        sortOrder:
          type: integer
        available:
          type: boolean

    OptionGroup:
      type: object
      required: [id, name, slug, inputType, required, priceType, sortOrder, items]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        inputType:
          type: string
          enum: [single, multiple]
        required:
          type: boolean
        priceType:
          type: string
          enum: [absolute, additive]
        sortOrder:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/OptionGroupItem"
        linkedCategoryIds:
          type: array
          items:
            type: integer

    OptionGroupInput:
      type: object
      required: [name, slug, inputType, required, priceType]
      properties:
        name:
          type: string
          minLength: 1
        slug:
          type: string
          minLength: 1
        description:
          type: string
        inputType:
          type: string
          enum: [single, multiple]
        required:
          type: boolean
        priceType:
          type: string
          enum: [absolute, additive]
        sortOrder:
          type: integer

    OptionGroupUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        inputType:
          type: string
          enum: [single, multiple]
        required:
          type: boolean
        priceType:
          type: string
          enum: [absolute, additive]
        sortOrder:
          type: integer

    OptionItemInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        defaultPrice:
          type: number
          minimum: 0
        priceByVariant:
          type: object
          additionalProperties:
            type: number
        sortOrder:
          type: integer
        available:
          type: boolean

    OptionItemUpdate:
      type: object
      properties:
        name:
          type: string
        defaultPrice:
          type: number
        priceByVariant:
          type: object
          additionalProperties:
            type: number
        sortOrder:
          type: integer
        available:
          type: boolean

    CategoryOptionGroupLink:
      type: object
      required: [categoryId]
      properties:
        categoryId:
          type: integer
        sortOrder:
          type: integer

    ItemOptionPricesInput:
      type: object
      required: [prices]
      properties:
        prices:
          type: array
          items:
            type: object
            required: [optionItemId, price]
            properties:
              optionItemId:
                type: integer
              price:
                type: number

    ItemOptionPrice:
      type: object
      required: [id, menuItemId, optionItemId, price]
      properties:
        id:
          type: integer
        menuItemId:
          type: integer
        optionItemId:
          type: integer
        price:
          type: number

    # ── MENU ITEM ─────────────────────────────────────────────────────────
    MenuItem:
      type: object
      required: [id, name, price, categoryId, available, featured, sortOrder, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        categoryId:
          type: integer
        available:
          type: boolean
        featured:
          type: boolean
        imageUrl:
          type: ["string", "null"]
        sortOrder:
          type: integer
        category:
          $ref: "#/components/schemas/Category"
        variants:
          type: array
          items:
            $ref: "#/components/schemas/ItemVariant"
        extras:
          type: array
          items:
            $ref: "#/components/schemas/ItemExtra"
        optionGroups:
          type: array
          items:
            $ref: "#/components/schemas/OptionGroup"
        createdAt:
          type: string
          format: date-time

    MenuItemInput:
      type: object
      required: [name, price, categoryId]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        price:
          type: number
          minimum: 0
        categoryId:
          type: integer
        available:
          type: boolean
        featured:
          type: boolean
        imageUrl:
          type: string
        sortOrder:
          type: integer

    MenuItemUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        categoryId:
          type: integer
        available:
          type: boolean
        featured:
          type: boolean
        imageUrl:
          type: string
        sortOrder:
          type: integer

    # ── RESTAURANT INFO ───────────────────────────────────────────────────
    RestaurantInfo:
      type: object
      required: [name]
      properties:
        name:
          type: string
        tagline:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        deliveryEnabled:
          type: boolean
        pickupEnabled:
          type: boolean
        minDeliveryOrder:
          type: number
        estimatedDeliveryTime:
          type: integer
        estimatedPickupTime:
          type: integer

    DayHours:
      type: object
      required: [id, dayOfWeek, dayName, isClosed]
      properties:
        id:
          type: integer
        dayOfWeek:
          type: integer
        dayName:
          type: string
        openTime:
          type: ["string", "null"]
        closeTime:
          type: ["string", "null"]
        isClosed:
          type: boolean

    OpeningHoursUpdate:
      type: object
      required: [hours]
      properties:
        hours:
          type: array
          items:
            type: object
            required: [dayOfWeek, isClosed]
            properties:
              dayOfWeek:
                type: integer
              openTime:
                type: string
              closeTime:
                type: string
              isClosed:
                type: boolean

    DeliveryArea:
      type: object
      required: [id, name, postalCode, minOrder, deliveryFee, active]
      properties:
        id:
          type: integer
        name:
          type: string
        postalCode:
          type: string
        minOrder:
          type: number
        deliveryFee:
          type: number
        active:
          type: boolean

    DeliveryAreaInput:
      type: object
      required: [name, postalCode, minOrder, deliveryFee]
      properties:
        name:
          type: string
          minLength: 1
        postalCode:
          type: string
          minLength: 1
        minOrder:
          type: number
          minimum: 0
        deliveryFee:
          type: number
          minimum: 0
        active:
          type: boolean

    DeliveryAreaUpdate:
      type: object
      properties:
        name:
          type: string
        postalCode:
          type: string
        minOrder:
          type: number
        deliveryFee:
          type: number
        active:
          type: boolean

    # ── COUPONS ───────────────────────────────────────────────────────────
    Coupon:
      type: object
      required: [id, code, discountType, discountValue, active, usageCount, createdAt]
      properties:
        id:
          type: integer
        code:
          type: string
        description:
          type: ["string", "null"]
        discountType:
          type: string
          enum: [percentage, fixed]
        discountValue:
          type: number
        minOrder:
          type: number
        active:
          type: boolean
        expiresAt:
          type: ["string", "null"]
          format: date-time
        usageCount:
          type: integer
        maxUsage:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time

    CouponInput:
      type: object
      required: [code, discountType, discountValue]
      properties:
        code:
          type: string
          minLength: 1
        description:
          type: string
        discountType:
          type: string
          enum: [percentage, fixed]
        discountValue:
          type: number
          minimum: 0
        minOrder:
          type: number
          minimum: 0
        active:
          type: boolean
        expiresAt:
          type: string
          format: date-time
        maxUsage:
          type: integer

    CouponUpdate:
      type: object
      properties:
        code:
          type: string
        description:
          type: string
        discountType:
          type: string
          enum: [percentage, fixed]
        discountValue:
          type: number
        minOrder:
          type: number
        active:
          type: boolean
        expiresAt:
          type: string
          format: date-time
        maxUsage:
          type: integer

    CouponValidationInput:
      type: object
      required: [code, orderTotal]
      properties:
        code:
          type: string
        orderTotal:
          type: number

    # ── ORDERS ────────────────────────────────────────────────────────────
    SelectedExtra:
      type: object
      required: [name, price]
      properties:
        name:
          type: string
        price:
          type: number

    OrderItemInput:
      type: object
      required: [menuItemId, quantity]
      properties:
        menuItemId:
          type: integer
        quantity:
          type: integer
          minimum: 1
        variantId:
          type: integer
          description: ID of the chosen variant (e.g. pizza size)
        selectedExtras:
          type: array
          items:
            $ref: "#/components/schemas/SelectedExtra"
        selectedOptions:
          type: array
          description: Selected option group items (new system)
          items:
            type: object
            required: [groupId, optionItemId, price]
            properties:
              groupId:
                type: integer
              optionItemId:
                type: integer
              price:
                type: number

    OrderItem:
      type: object
      required: [id, itemName, itemPrice, quantity, lineTotal]
      properties:
        id:
          type: integer
        menuItemId:
          type: ["integer", "null"]
        itemName:
          type: string
        itemPrice:
          type: number
        quantity:
          type: integer
        lineTotal:
          type: number
        variantName:
          type: ["string", "null"]
        extrasSnapshot:
          type: array
          items:
            $ref: "#/components/schemas/SelectedExtra"
        optionsSnapshot:
          type: array
          items:
            type: object
            required: [groupId, groupName, optionItemId, optionItemName, price]
            properties:
              groupId:
                type: integer
              groupName:
                type: string
              optionItemId:
                type: integer
              optionItemName:
                type: string
              price:
                type: number

    OrderInput:
      type: object
      required: [orderType, customerName, customerPhone, items]
      properties:
        orderType:
          type: string
          enum: [delivery, pickup]
        customerName:
          type: string
          minLength: 1
        customerPhone:
          type: string
          minLength: 1
        customerEmail:
          type: ["string", "null"]
        deliveryAddress:
          type: string
        postalCode:
          type: string
        city:
          type: string
        notes:
          type: string
        couponCode:
          type: ["string", "null"]
        paymentMethod:
          type: string
          enum: [cash, card]
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemInput"
          minItems: 1

    Order:
      type: object
      required: [id, orderNumber, orderType, status, customerName, customerPhone, subtotal, deliveryFee, discountAmount, total, items, createdAt]
      properties:
        id:
          type: integer
        orderNumber:
          type: string
        orderType:
          type: string
          enum: [delivery, pickup]
        status:
          type: string
        customerId:
          type: ["integer", "null"]
        paymentMethod:
          type: string
          enum: [cash, card]
        customerName:
          type: string
        customerPhone:
          type: string
        customerEmail:
          type: ["string", "null"]
        deliveryAddress:
          type: ["string", "null"]
        postalCode:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        subtotal:
          type: number
        deliveryFee:
          type: number
        discountAmount:
          type: number
        total:
          type: number
        couponCode:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        createdAt:
          type: string
          format: date-time

    OrderStatusPatch:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, confirmed, preparing, ready, delivering, completed, cancelled]
        notes:
          type: string

    KitchenOrderStatusPatch:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [confirmed, preparing, ready, delivering, completed]

    # ── CUSTOMERS ─────────────────────────────────────────────────────────
    Customer:
      type: object
      required: [name, phone, orderCount, totalSpent]
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: ["string", "null"]
        orderCount:
          type: integer
        totalSpent:
          type: number
        lastOrderAt:
          type: ["string", "null"]
          format: date-time

    # ── ADMIN STATS ───────────────────────────────────────────────────────
    AdminStats:
      type: object
      required: [totalOrders, pendingOrders, todayOrders, todayRevenue, totalRevenue, weekRevenue, popularItems]
      properties:
        totalOrders:
          type: integer
        pendingOrders:
          type: integer
        todayOrders:
          type: integer
        todayRevenue:
          type: number
        totalRevenue:
          type: number
        weekRevenue:
          type: number
        popularItems:
          type: array
          items:
            $ref: "#/components/schemas/PopularItem"

    PopularItem:
      type: object
      required: [name, orderCount]
      properties:
        name:
          type: string
        orderCount:
          type: integer

    # ── AUTH ─────────────────────────────────────────────────────────────
    AdminCredentials:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    AdminSession:
      type: object
      required: [authenticated]
      properties:
        authenticated:
          type: boolean
        username:
          type: ["string", "null"]

    # ── SETTINGS ─────────────────────────────────────────────────────────
    AppSettings:
      type: object
      properties:
        restaurantName:
          type: string
        tagline:
          type: string
        address:
          type: string
        phone:
          type: string
        email:
          type: string
        deliveryEnabled:
          type: boolean
        pickupEnabled:
          type: boolean
        minDeliveryOrder:
          type: number
        estimatedDeliveryTime:
          type: integer
        estimatedPickupTime:
          type: integer
        adminUsername:
          type: string
        adminPassword:
          type: string

    SettingsUpdate:
      type: object
      properties:
        restaurantName:
          type: string
        tagline:
          type: string
        address:
          type: string
        phone:
          type: string
        email:
          type: string
        deliveryEnabled:
          type: boolean
        pickupEnabled:
          type: boolean
        minDeliveryOrder:
          type: number
        estimatedDeliveryTime:
          type: integer
        estimatedPickupTime:
          type: integer
        adminUsername:
          type: string
        adminPassword:
          type: string

    # ── CUSTOMER ACCOUNT ──────────────────────────────────────────────────────
    CustomerProfile:
      type: object
      required: [id, email, firstName, lastName, phone, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        createdAt:
          type: string
          format: date-time

    CustomerSession:
      type: object
      required: [authenticated]
      properties:
        authenticated:
          type: boolean
        customer:
          $ref: "#/components/schemas/CustomerProfile"

    CustomerRegisterInput:
      type: object
      required: [email, password, firstName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        firstName:
          type: string
          minLength: 1
        lastName:
          type: string
        phone:
          type: string

    CustomerLoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    FavoriteOrderItem:
      type: object
      required: [menuItemId, itemName, quantity, unitPrice, selectedOptions]
      properties:
        menuItemId:
          type: integer
        itemName:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
        selectedOptions:
          type: array
          items:
            type: object
            required: [groupId, groupName, optionItemId, optionItemName, price, priceType]
            properties:
              groupId:
